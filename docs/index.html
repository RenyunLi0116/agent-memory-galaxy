<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CyberMemory</title>
</head>
<body>
<style>
  :root{ --holo:#8ab4ff; --gold:#ffcf6b; --bg0:#04030f; --panel:rgba(14,12,34,.74);
    --line:rgba(138,170,255,.22); --fg:#dbe4ff; --mut:#6b6fa6; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg0);color:var(--fg);overflow:hidden;
    font-family:ui-monospace,SFMono-Regular,Menlo,"PingFang SC","Microsoft YaHei",monospace}
  #app{position:fixed;inset:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;cursor:crosshair}
  canvas.drag{cursor:grabbing}
  /* 顶部 HUD 条 */
  header{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;gap:16px;
    padding:10px 18px;z-index:6;pointer-events:none;
    background:linear-gradient(180deg,rgba(2,6,15,.95),rgba(2,6,15,0))}
  header>*{pointer-events:auto}
  header h1{font-size:13px;margin:0;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:var(--holo);text-shadow:0 0 14px rgba(56,225,255,.6)}
  #stat{color:var(--mut);font-size:11px;letter-spacing:1px;font-variant-numeric:tabular-nums}
  #stat b{color:var(--gold)}
  .live{color:#39e6a0}.live::before{content:"●";margin-right:5px;animation:bl 1.6s infinite}
  @keyframes bl{50%{opacity:.25}}
  .grow{flex:1}
  input,button,select{background:rgba(10,24,44,.8);color:var(--fg);border:1px solid var(--line);
    border-radius:3px;padding:6px 10px;font:inherit;font-size:12px;outline:none}
  input:focus,select:focus{border-color:var(--holo);box-shadow:0 0 0 1px var(--holo),0 0 12px rgba(56,225,255,.35)}
  button{cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-size:11px;color:var(--holo)}
  button:hover{background:rgba(56,225,255,.12)}
  #search{width:200px}
  /* 侧栏控制台 */
  #side{position:absolute;top:52px;left:14px;width:230px;max-height:calc(100% - 70px);overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:0;backdrop-filter:blur(8px);
    z-index:5;box-shadow:0 0 30px rgba(0,0,0,.6),inset 0 0 30px rgba(56,225,255,.04);font-size:12px}
  .hd{padding:7px 11px;font-size:10px;letter-spacing:1.5px;color:var(--holo);text-transform:uppercase;
    border-bottom:1px solid var(--line);background:rgba(56,225,255,.05);display:flex;justify-content:space-between}
  .sec{padding:8px 11px;border-bottom:1px solid rgba(56,225,255,.08)}
  .tog{display:flex;align-items:center;gap:8px;padding:3px 0;cursor:pointer;user-select:none}
  .tog .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 8px currentColor}
  .tog .nm{flex:1}.tog .cnt{color:var(--mut);font-variant-numeric:tabular-nums;font-size:11px}
  .tog .ex{color:var(--mut);width:12px;text-align:center;transition:.15s}
  .tog.open .ex{transform:rotate(90deg);color:var(--holo)}
  .tog.off{opacity:.32}
  .desc{font-size:10.5px;color:var(--mut);margin:1px 0 4px 17px;line-height:1.5}
  .mem{margin:0 0 4px 17px;display:none;max-height:160px;overflow:auto}
  .mem.show{display:block}
  .mem div{padding:2px 6px;cursor:pointer;color:#9fc4e8;border-left:1px solid var(--line);margin:1px 0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mem div:hover{background:rgba(56,225,255,.12);color:#fff}
  .row{margin:8px 0}
  .row label{display:block;color:var(--mut);font-size:10px;letter-spacing:1px;margin-bottom:3px;text-transform:uppercase}
  .row select,.row input[type=range]{width:100%}
  .ctl{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:11px;flex-wrap:wrap}
  .ctl label{display:flex;align-items:center;gap:4px;cursor:pointer}
  .ctl input{accent-color:var(--holo)}
  /* 详情读出面板 */
  #detail{position:absolute;top:52px;right:14px;width:340px;max-height:calc(100% - 70px);overflow:auto;
    background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:0;display:none;
    backdrop-filter:blur(8px);z-index:5;box-shadow:0 0 30px rgba(0,0,0,.6),inset 0 0 40px rgba(56,225,255,.05)}
  #detail.show{display:block}
  #detail .dh{padding:9px 13px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;
    background:rgba(56,225,255,.06)}
  #detail .tag{font-size:9.5px;padding:2px 8px;border-radius:2px;color:#02060f;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  #detail .db{padding:12px 14px}
  #detail h2{margin:0 0 8px;font-size:14.5px;line-height:1.4;color:#eaf6ff;font-family:-apple-system,sans-serif}
  #detail .kv{display:grid;grid-template-columns:auto 1fr;gap:3px 10px;font-size:11.5px;margin:6px 0}
  #detail .kv b{color:var(--mut);font-weight:400}
  #detail .excerpt{margin-top:10px;padding:9px;background:rgba(2,8,18,.7);border:1px solid var(--line);
    border-radius:3px;font-size:11px;line-height:1.55;white-space:pre-wrap;color:#a9c8e8;max-height:220px;overflow:auto}
  #detail h4{margin:11px 0 5px;font-size:10px;color:var(--holo);letter-spacing:1px;text-transform:uppercase}
  #detail .nb{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 7px;margin:2px 3px 2px 0;
    background:rgba(10,24,44,.7);border:1px solid var(--line);border-radius:2px;cursor:pointer}
  #detail .nb:hover{border-color:var(--holo);color:#fff}
  #detail .nb .dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 5px currentColor}
  #detail .close{margin-left:auto;color:var(--mut);cursor:pointer;border:none;background:none;font-size:15px}
  #detail .src{font-size:10px;color:var(--mut);word-break:break-all;margin-top:9px}
  #hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);color:var(--mut);font-size:10.5px;
    letter-spacing:1px;z-index:5;background:rgba(2,6,15,.6);padding:5px 14px;border:1px solid var(--line);border-radius:3px}
  #empty{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:var(--mut);z-index:3}
  /* 解锁 */
  #lock{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 50% 42%,#06182e,#02060f 72%)}
  #lock .lb{width:350px;max-width:88vw;background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:26px 24px;text-align:center;box-shadow:0 0 50px rgba(56,225,255,.18),inset 0 0 40px rgba(56,225,255,.05)}
  #lock .t{font-size:16px;font-weight:700;letter-spacing:3px;color:var(--holo);text-transform:uppercase;text-shadow:0 0 16px rgba(56,225,255,.6)}
  #lock .s{color:var(--mut);font-size:12px;margin:9px 0 18px;letter-spacing:1px}
  #lock input{width:100%;text-align:center;letter-spacing:2px}
  #lock button{width:100%;margin-top:12px;padding:10px}
  #lock #le{color:#ff6f8a;font-size:11px;min-height:15px;margin-top:9px}
  #lock .f{color:var(--mut);font-size:10px;margin-top:13px;line-height:1.6}
  /* 顶栏风格下拉（sq- 色卡菜单）—— 触发钮沿用全局 button 语言，面板同 HUD 面板 */
  #sq-trig{display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  #sq-trig .sq-caret{font-size:9px;color:var(--mut);transition:transform .15s}
  #sq-trig.open .sq-caret{transform:rotate(180deg);color:var(--holo)}
  #sq-menu{position:absolute;top:46px;right:14px;z-index:7;display:none;width:238px;
    grid-template-columns:1fr 1fr;gap:8px;padding:10px;
    background:var(--panel);border:1px solid var(--line);border-radius:5px;backdrop-filter:blur(8px);
    box-shadow:0 0 30px rgba(0,0,0,.6),inset 0 0 30px rgba(56,225,255,.04)}
  #sq-menu.show{display:grid}
  .sq-card{display:flex;flex-direction:column;gap:4px;padding:6px;border-radius:4px;
    text-transform:none;text-align:left;font-size:11px;letter-spacing:.5px;line-height:1.35;color:var(--fg)}
  .sq-card .sq-sw{display:block;height:40px;border-radius:3px;border:1px solid rgba(255,255,255,.08)}
  .sq-card .sq-en{display:block;font-size:8.5px;color:var(--mut);letter-spacing:1px}
  .sq-card:hover{border-color:var(--holo)}
  .sq-card:hover .sq-sw{filter:brightness(1.18)}
  .sq-card.on{border-color:var(--holo);color:#fff;
    box-shadow:0 0 10px var(--holo),inset 0 0 10px rgba(255,255,255,.07)}
  /* 迷你主题预览色卡 */
  .sq-sw-cosmos{background:
    radial-gradient(circle at 22% 30%,rgba(255,255,255,.95) 0 1px,transparent 2px),
    radial-gradient(circle at 68% 20%,rgba(255,255,255,.75) 0 .8px,transparent 1.8px),
    radial-gradient(circle at 82% 66%,rgba(255,255,255,.9) 0 1px,transparent 2px),
    radial-gradient(circle at 38% 76%,rgba(255,255,255,.7) 0 .8px,transparent 1.8px),
    radial-gradient(ellipse at 60% 40%,rgba(122,92,255,.55),transparent 65%),
    linear-gradient(135deg,#1b1450,#0b0c2e 60%,#04030f)}
  .sq-sw-jarvis{background:
    repeating-linear-gradient(0deg,rgba(56,225,255,.22) 0 1px,transparent 1px 8px),
    repeating-linear-gradient(90deg,rgba(56,225,255,.22) 0 1px,transparent 1px 8px),
    radial-gradient(circle at 50% 45%,#0b2e48,#020610 78%)}
  .sq-sw-ion{background:
    radial-gradient(circle at 30% 38%,rgba(77,224,255,.8),transparent 55%),
    radial-gradient(circle at 72% 66%,rgba(157,84,255,.7),transparent 58%),
    linear-gradient(135deg,#0a1034,#030312)}
  .sq-sw-galaxy{background:
    radial-gradient(ellipse 62% 34% at 50% 52%,rgba(255,222,164,.92),rgba(255,150,80,.32) 45%,transparent 72%),
    radial-gradient(ellipse 92% 58% at 50% 50%,rgba(130,150,255,.22),transparent 75%),
    linear-gradient(160deg,#0b0b26,#02010a)}
</style>

<div id="app">
  <canvas id="cv"></canvas>
  <header>
    <h1>◢ CyberMemory</h1>
    <span id="stat" class="live">BOOTING…</span>
    <span id="live" style="color:#ff5566;font-weight:700;text-shadow:0 0 10px rgba(255,60,80,.7);font-size:11px;letter-spacing:1px"></span>
    <input id="search" placeholder="SEARCH ⏎">
    <div class="grow"></div>
    <button id="fit">RECENTER</button>
        <button id="sq-trig" aria-haspopup="true" aria-expanded="false" title="切换视觉风格 STYLE"><span id="sq-cur">🌠 星空</span><span class="sq-caret">▾</span></button>
    <div id="sq-menu" role="menu" aria-hidden="true">
      <button class="sq-card on" data-s="cosmos" role="menuitemradio" aria-checked="true">
        <span class="sq-sw sq-sw-cosmos"></span><span class="sq-nm">🌠 星空</span><small class="sq-en">COSMOS · 默认</small>
      </button>
      <button class="sq-card" data-s="jarvis" role="menuitemradio" aria-checked="false">
        <span class="sq-sw sq-sw-jarvis"></span><span class="sq-nm">🛡 贾维斯</span><small class="sq-en">JARVIS</small>
      </button>
      <button class="sq-card" data-s="ion" role="menuitemradio" aria-checked="false">
        <span class="sq-sw sq-sw-ion"></span><span class="sq-nm">⚛ 离子</span><small class="sq-en">ION</small>
      </button>
      <button class="sq-card" data-s="galaxy" role="menuitemradio" aria-checked="false">
        <span class="sq-sw sq-sw-galaxy"></span><span class="sq-nm">🌌 银河</span><small class="sq-en">GALAXY</small>
      </button>
    </div>
  </header>
  <div id="side">
    <div class="hd"><span>节点类型 NODE TYPES</span><span id="ttot"></span></div>
    <div id="types" class="sec"></div>
    <div class="hd"><span>任务类型 TASK</span></div>
    <div id="tasks" class="sec"></div>
    <div class="sec">
      <div class="ctl" style="margin-bottom:7px">着色:
        <label><input type="radio" name="cm" value="type" checked> 类型</label>
        <label><input type="radio" name="cm" value="task"> 任务</label>
        <label><input type="radio" name="cm" value="tool"> 工具</label>
      </div>
      <div class="row"><label>项目 PROJECT</label><select id="fProject"><option value="">ALL</option></select></div>
      <div class="row"><label>机器 MACHINE</label><select id="fMachine"><option value="">ALL</option></select></div>
      <div class="row"><label>状态 STATUS</label><select id="fStatus"><option value="">ALL</option>
        <option>done</option><option>doing</option><option>planned</option><option>logged</option></select></div>
      <div class="row"><label>活跃 ACTIVITY</label><select id="fActivity"><option value="">全部</option>
        <option value="active">🟢 近3天有记录</option><option value="live">🔴 正在工作</option></select></div>
      <div class="row"><label>时间轴 <span id="tlLbl" style="color:var(--holo);text-transform:none"></span></label>
        <div><input type="range" id="tlMin" min="0" max="100" value="0">
        <input type="range" id="tlMax" min="0" max="100" value="100"></div></div>
      <div class="ctl"><label><input type="checkbox" id="cSpin" checked> 自转</label>
        <label><input type="checkbox" id="cEdges" checked> 连线</label>
        <label title="从各机 Claude/Codex/Cursor 原生会话自动提炼、无人工 agent_memory.md 的记忆"><input type="checkbox" id="cDerived"> 隐藏自动提炼</label></div>
    </div>
  </div>
  <div id="detail"><div class="dh"><span id="dtag" class="tag"></span><span style="font-size:10px;color:var(--mut);letter-spacing:1px">READOUT</span><button class="close" id="dClose">✕</button></div><div class="db" id="dBody"></div></div>
  <div id="hint">拖拽旋转 · 滚轮缩放 · 点击读出 · 🟢近3天有记录 · 🔴正在工作</div>
  <div id="empty">NO MATCH</div>
</div>

<script>
"use strict";
const PALETTE={project:"#ff5d73",entry:"#4ea8ff",fact:"#2ee6c5",agent:"#ffb24d",dataset:"#b07bff",
  server:"#ff5fa2",model:"#2bf0a0",method:"#ff7bdf",file:"#8aa0c8",wandb:"#ffd84d",tech:"#33c6ff",notion:"#d9c2ff",machine:"#ffe14d",
  liveagent:"#ff3b4e"};
const TLAB={project:"项目",entry:"工作记录",fact:"自动记忆",agent:"Agent",dataset:"数据集",server:"服务器",
  model:"模型/Run",method:"方法/思路",file:"文件",wandb:"W&B",tech:"框架/技术",notion:"Notion",liveagent:"正在工作"};
const DESC={project:"研究项目 — 工作归属的顶层单位",entry:"一条工作记录(某次 session/某天)",
  fact:"Claude 自动记忆事实卡",agent:"标注的执行者(人/AI)",dataset:"数据集/训练数据(h5·mp4·内参…)",
  server:"服务器 (真实 IP/主机名)",model:"训练出的模型 / wandb run",method:"项目内技术思路(如 思路3)",
  file:"代码/配置/产物文件",wandb:"实验追踪 run id",tech:"外部框架/技术(如 Depth-Anything 3)",
  notion:"Notion 页面/同步目标",machine:"记录所在机器",liveagent:"正在工作(红光·6小时内)"};
const LIVE_TTL=6*60*60*1000;   // 心跳新鲜期：6 小时
const TASKC={"训练":"#ff8a3d","数据":"#3da5ff","评测":"#2be0a6","部署":"#9aa6c0","调研":"#c06bff","同步":"#ff6fae","规划":"#ffd24b","其他":"#6b7690"};
const TOOLC={claude:"#c39bff",codex:"#10b981",human:"#ffd24b",agent:"#8aa0c8"};   // 产出工具配色
const BASE={project:13,machine:15,agent:10,fact:7,entry:6,notion:9,dataset:9,server:9,model:8,method:8,tech:8,file:5};
const DEFAULT_OFF=new Set(["file"]);
const FOV=820,DIST=920;

let RAW=null,N=[],E=[],byId={},adj={};
let cv,ctx,W=0,H=0,DPR=1,cx=0,cy=0;
let yaw=0.5,pitch=-0.32,zoom=1.15,autoSpin=true,showEdges=true,colorMode="type";
let sel=null,hover=null,dragging=false,moved=false,last={x:0,y:0};
let alpha=1,wmax=1,stars=[],nebula=[],tick=0,boot=0;
let filters={types:new Set(),project:"",machine:"",status:"",task:"",activity:"",hideDerived:false,tmin:0,tmax:1e15};
let dmin=0,dmax=0,hasDates=false;
let liveCount=0,_pw=null,_encMode=false;   // 红光 live 统计 + 轮询用密码/加密模式

async function load(){
  if(window.GRAPH){RAW=window.GRAPH;return go();}
  let r=null;try{const x=await fetch('graph.json',{cache:'no-store'});if(x.ok)r=await x.json();}catch(e){}
  if(r){RAW=r;return go();}
  let blob=null;try{const x=await fetch('graph.enc.json',{cache:'no-store'});if(x.ok)blob=await x.json();}catch(e){}
  if(blob)return showUnlock(blob);
  document.getElementById('stat').textContent='NO DATA';
}
const SEP='\u0000';   // 合并两密码的分隔符（NUL U+0000；与 encrypt.py SEP="\x00" 逐字节一致）
function showUnlock(blob){
  document.getElementById('stat').textContent='🔒 ENCRYPTED';
  const dual=!!(blob.dual||blob.v>=2);   // v2/dual → 两个密码框；否则 v1 单框（旧行为）
  const ov=document.createElement('div');ov.id='lock';
  ov.innerHTML=`<div class="lb"><div class="t">◢ CyberMemory</div>
    <div class="s">🔒 已加密 · ${dual?'输入两个密码在本地解锁':'输入密码在本地解锁'}</div>
    ${dual?`<input id="lp1" type="password" placeholder="密码 1" autocomplete="off">
    <input id="lp2" type="password" placeholder="密码 2" autocomplete="off" style="margin-top:9px">`
    :`<input id="lp" type="password" placeholder="PASSWORD" autocomplete="current-password">`}
    <button id="lg">UNLOCK</button><div id="le"></div>
    <div class="f">密码只在你的浏览器里用于解密，不上传、不留存。<br>搜索引擎与未授权访问者只能看到密文。</div></div>`;
  document.body.appendChild(ov);
  const go2=ov.querySelector('#lg'),er=ov.querySelector('#le');
  const inputs=dual?[ov.querySelector('#lp1'),ov.querySelector('#lp2')]:[ov.querySelector('#lp')];
  const combinedOf=()=>dual?inputs[0].value+SEP+inputs[1].value:inputs[0].value;
  const t=async()=>{er.textContent='';go2.disabled=true;go2.textContent='DECRYPTING…';
    const combined=combinedOf();
    try{RAW=await decrypt(blob,combined);_pw=combined;_encMode=true;ov.remove();go();}
    catch(e){er.textContent='密码错误，请重试';go2.disabled=false;go2.textContent='UNLOCK';inputs[0].select();}};
  go2.onclick=t;inputs.forEach(i=>i.onkeydown=e=>{if(e.key==='Enter')t();});setTimeout(()=>inputs[0].focus(),50);
}
async function decrypt(blob,pw){
  if(!crypto.subtle)throw new Error('需 https');
  const enc=new TextEncoder(),b6=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
  const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b6(blob.salt),iterations:blob.iter,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b6(blob.iv)},key,b6(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

function go(){
  N=RAW.nodes;E=RAW.edges;byId={};adj={};
  N.forEach(n=>{byId[n.id]=n;adj[n.id]=[];});
  E=E.filter(e=>byId[e.source]&&byId[e.target]);
  E.forEach(e=>{adj[e.source].push({o:e.target,e});adj[e.target].push({o:e.source,e});});
  wmax=Math.max(...N.map(n=>Math.sqrt(n.weight||1)));
  N.forEach((n,i)=>{const u=((i*0.61803)%1)*2-1,t=i*2.399963,r=300*Math.cbrt(((i*0.7548)%1)+0.05),s=Math.sqrt(1-u*u);
    n.x=r*s*Math.cos(t);n.y=r*u;n.z=r*s*Math.sin(t);n.vx=n.vy=n.vz=0;});
  const ds=N.filter(n=>n.date).map(n=>Date.parse(n.date)).filter(x=>!isNaN(x));
  if(ds.length){hasDates=true;dmin=Math.min(...ds);dmax=Math.max(...ds);filters.tmin=dmin;filters.tmax=dmax;}
  // 活跃 = "有记录的最近 3 天"（取最近 3 个有记录的日期，自动跳过休假断档；越近 _rec 越大）
  const recDays=[...new Set(N.filter(n=>n.type==='entry'&&n.date).map(n=>n.date))].sort().slice(-3);
  const rank={};recDays.forEach((d,i)=>rank[d]=(i+1)/recDays.length);   // 最旧→1/3 … 最新→1
  N.forEach(n=>{n._rec=0;n._active=false;
    if(n.type==='entry'&&n.date&&rank[n.date]!=null){n._active=true;n._rec=rank[n.date];}});
  computeLive();
  const types=[...new Set(N.map(n=>n.type))];

function isLiveAgent(n){return n.type==='liveagent'&&n.status==='working'&&n.heartbeat&&(Date.now()-Date.parse(n.heartbeat)<LIVE_TTL);}

  liveCount=0; N.forEach(n=>{n._live=false;});

  // 只沿 working_on 从"新鲜 liveagent"传播到它正在做的项目（不经机器级联，避免整机染红）

function step3d(){

      const f=kr/d2,d=Math.sqrt(d2),ux=dx/d*f,uy=dy/d*f,uz=dz/d*f;a._fx+=ux;a._fy+=uy;a._fz+=uz;b._fx-=ux;b._fy-=uy;b._fz-=uz;}
    a._fx-=a.x*kg;a._fy-=a.y*kg;a._fz-=a.z*kg;}
  for(const e of E){if(!visSet.has(e.source)||!visSet.has(e.target))continue;const a=byId[e.source],b=byId[e.target];
    let dx=b.x-a.x,dy=b.y-a.y,dz=b.z-a.z,d=Math.sqrt(dx*dx+dy*dy+dz*dz)||.01;const f=ks*(d-L),ux=dx/d*f,uy=dy/d*f,uz=dz/d*f;
    a._fx+=ux;a._fy+=uy;a._fz+=uz;b._fx-=ux;b._fy-=uy;b._fz-=uz;}
  for(const a of ns){a.vx=(a.vx+a._fx)*dp*alpha;a.vy=(a.vy+a._fy)*dp*alpha;a.vz=(a.vz+a._fz)*dp*alpha;a.x+=a.vx;a.y+=a.vy;a.z+=a.vz;}

const SHAPE={project:'reactor',machine:'reactor',agent:'ring',file:'dot',entry:'diamond',method:'diamond',

function glyphShapes(n,dep){const x=n._sx,y=n._sy,r=n._r,c=col(n),sh=SHAPE[n.type]||'dot',fill=hx(c,.92*dep),edge=hx('#eaffff',.85*dep);

// ---------- HUD ----------
function ease(t){return 1-Math.pow(1-t,3);}
function hudRings(){
  const zf=Math.max(0.55,Math.min(2.0,zoom));        // 随缩放联动(限幅)
  const R=Math.min(W,H)*0.4*zf, a=tick*0.0008;
  ctx.save();ctx.translate(cx,cy);
  // 三层断续旋转环
  for(let k=0;k<3;k++){const r=R*(0.6+k*0.18), seg=[44,30,56][k], dir=k%2?-1:1, rot=a*(1+k*0.6)*dir;
    ctx.strokeStyle=hx('#38e1ff',0.13+0.05*k);ctx.lineWidth=1;
    for(let i=0;i<seg;i++){const t0=rot+i/seg*6.2832;ctx.beginPath();ctx.arc(0,0,r,t0,t0+0.045);ctx.stroke();}}
  // 主环 + 金色粗刻度（瞄准盘）
  ctx.strokeStyle=hx('#38e1ff',0.16);ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,R,0,6.2832);ctx.stroke();
  ctx.strokeStyle=hx('#ffc24b',0.55);ctx.lineWidth=2.2;
  for(let i=0;i<12;i++){const t0=-a*2+i/12*6.2832;ctx.beginPath();ctx.arc(0,0,R,t0,t0+0.02);ctx.stroke();}
  // 外圈 radial 刻度尺
  ctx.strokeStyle=hx('#38e1ff',0.22);ctx.lineWidth=1;
  for(let i=0;i<72;i++){const t=i/72*6.2832, rr=(i%6===0)?R*0.93:R*0.965;
    ctx.beginPath();ctx.moveTo(Math.cos(t)*rr,Math.sin(t)*rr);ctx.lineTo(Math.cos(t)*R,Math.sin(t)*R);ctx.stroke();}
  // 内圈反向细刻度
  ctx.strokeStyle=hx('#38e1ff',0.28);ctx.lineWidth=1;
  for(let i=0;i<48;i++){const t0=a*3+i/48*6.2832;ctx.beginPath();ctx.arc(0,0,R*0.5,t0,t0+0.006);ctx.stroke();}

  const cr=11+Math.sin(tick*0.06)*1.5;
  ctx.strokeStyle=hx('#38e1ff',0.5);ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,0,cr,0,6.2832);ctx.stroke();
  [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dx,dy])=>{ctx.beginPath();ctx.moveTo(dx*cr*0.5,dy*cr*0.5);ctx.lineTo(dx*(cr+7),dy*(cr+7));ctx.stroke();});
  ctx.restore();
}
function corners(){ctx.strokeStyle=hx('#38e1ff',0.5);ctx.lineWidth=1.5;const m=16,L=26;

    ctx.beginPath();ctx.moveTo(x,y+dy*L);ctx.lineTo(x,y);ctx.lineTo(x+dx*L,y);ctx.stroke();});
  ctx.fillStyle=hx('#5d7da6',0.5);ctx.font='9px ui-monospace';ctx.fillText('AMG//HOLO-NET v2',m+8,H-m-8);}

    g.addColorStop(0,hx(n.col,n.a));g.addColorStop(.6,hx(n.col,n.a*0.35));g.addColorStop(1,hx(n.col,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x+dx,n.y+dy,n.r,0,6.2832);ctx.fill();}

// —— 60s 轮询：拉最新快照，温和更新 liveagent（不重置相机/选中/布局/过滤）——
let _polling=false;
function startPolling(){if(_polling)return;_polling=true;setInterval(pollOnce,60000);}
async function pollOnce(){
  if(window.GRAPH)return;                 // 内联数据(standalone/artifact)：无外部文件可轮询
  try{
    let fresh=null;
    if(_encMode){const x=await fetch('graph.enc.json',{cache:'no-store'});if(!x.ok)return;fresh=await decrypt(await x.json(),_pw);}
    else{const x=await fetch('graph.json',{cache:'no-store'});if(!x.ok)return;fresh=await x.json();}
    if(fresh&&fresh.nodes)mergeLive(fresh);
  }catch(e){}
}
function mergeLive(fresh){
  const freshLA=fresh.nodes.filter(n=>n.type==='liveagent');
  const laIds=new Set(freshLA.map(n=>n.id));
  let changed=false;
  freshLA.forEach(fn=>{
    const ex=byId[fn.id];
    if(ex){ex.heartbeat=fn.heartbeat;ex.status=fn.status;ex.current=fn.current;ex.project=fn.project;ex.tool=fn.tool;}
    else{fn.x=(Math.random()*2-1)*220;fn.y=(Math.random()*2-1)*220;fn.z=(Math.random()*2-1)*220;fn.vx=fn.vy=fn.vz=0;
      N.push(fn);byId[fn.id]=fn;adj[fn.id]=[];filters.types.add('liveagent');changed=true;}
  });
  // 每次对齐这些 liveagent 的 working_on 边（agent 可能换了项目：删旧建新）
  if(laIds.size){
    const before=E.filter(e=>e.type==='working_on'&&(laIds.has(e.source)||laIds.has(e.target))).length;
    E=E.filter(e=>!(e.type==='working_on'&&(laIds.has(e.source)||laIds.has(e.target))));
    Object.keys(adj).forEach(k=>{adj[k]=adj[k].filter(x=>!(x.e.type==='working_on'&&(laIds.has(k)||laIds.has(x.o))));});
    let now=0;
    fresh.edges.filter(e=>e.type==='working_on').forEach(e=>{
      if(byId[e.source]&&byId[e.target]){adj[e.source].push({o:e.target,e});adj[e.target].push({o:e.source,e});E.push(e);now++;}});
    if(now!==before)changed=true;
  }
  if(changed){applyFilter();alpha=Math.max(alpha,.4);}
  computeLive();
  if(sel&&sel.type==='liveagent'&&document.getElementById('detail').classList.contains('show'))select(sel);  // 刷新打开中的详情
}

function setup(){

  window.addEventListener('mousemove',e=>{if(dragging){const dx=e.clientX-last.x,dy=e.clientY-last.y;if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
      yaw+=dx*.005;pitch+=dy*.005;pitch=Math.max(-1.4,Math.min(1.4,pitch));last={x:e.clientX,y:e.clientY};}
    else{hover=pick(e.clientX,e.clientY);cv.style.cursor=hover?'pointer':'crosshair';}});
  window.addEventListener('mouseup',e=>{if(dragging&&!moved){const p=pick(e.clientX,e.clientY);select(p);}dragging=false;cv.classList.remove('drag');});
  cv.addEventListener('wheel',e=>{e.preventDefault();zoom*=e.deltaY<0?1.12:1/1.12;zoom=Math.max(.2,Math.min(6,zoom));},{passive:false});

function pick(mx,my){const r=cv.getBoundingClientRect();mx-=r.left;my-=r.top;let best=null,bd=1e9;

function relTime(iso){const t=Date.parse(iso);if(isNaN(t))return iso||'?';const m=(Date.now()-t)/60000;
  if(m<1)return '刚刚';if(m<60)return `${m|0} 分钟前`;if(m<1440)return `${m/60|0} 小时前`;return `${m/1440|0} 天前`;}
function esc(s){return(s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

// ==== THEME: JARVIS —— 钢铁侠全息 HUD（点阵网格 + 扫描微光 + 线框全息节点）====
let _jvDotsA=[],_jvDotsB=[],_jvSpecks=[];
function _jvInitBg(){
  _jvDotsA=[];_jvDotsB=[];_jvSpecks=[];
  const gs=36,ox=(W%gs)/2,oy=(H%gs)/2;
  let i=0;
  for(let x=ox;x<=W;x+=gs,i++){let j=0;
    for(let y=oy;y<=H;y+=gs,j++){
      if(_jvDotsA.length+_jvDotsB.length>=5600)break;
      if(i%4===2&&j%4===2)_jvDotsB.push({x,y});else _jvDotsA.push({x,y});
    }
  }
  const ns=Math.min(120,Math.round(W*H/16000));
  for(let k=0;k<ns;k++)_jvSpecks.push({x:Math.random()*W,y:Math.random()*H,
    v:0.06+Math.random()*0.2,p:Math.random()*6.2832,r:Math.random()<0.85?1:2});
}
function _jvBg(){
  // 近黑海军蓝底
  const g=ctx.createRadialGradient(cx,cy*0.9,0,cx,cy,Math.max(W,H)*0.85);
  g.addColorStop(0,'#051325');g.addColorStop(0.55,'#030b18');g.addColorStop(1,'#010409');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  ctx.fillStyle='rgba(56,225,255,0.10)';
  for(const d of _jvDotsA)ctx.fillRect(d.x-0.5,d.y-0.5,1.5,1.5);
  ctx.fillStyle='rgba(56,225,255,0.18)';
  for(const d of _jvDotsB)ctx.fillRect(d.x-0.5,d.y-0.5,2,2);
  // 同心测距环 + 极淡十字轴（静态，藏在图后面）
  const R0=Math.min(W,H)*0.47;
  ctx.strokeStyle='rgba(56,225,255,0.08)';ctx.lineWidth=1;
  for(let k=1;k<=4;k++){ctx.beginPath();ctx.arc(cx,cy,R0*k/4,0,6.2832);ctx.stroke();}
  ctx.strokeStyle='rgba(56,225,255,0.05)';

  // 缓慢下扫的横向 scanline 微光（一条渐变带 + 1px 亮线）

  const sg=ctx.createLinearGradient(0,sy2-60,0,sy2+60);
  sg.addColorStop(0,'rgba(56,225,255,0)');sg.addColorStop(0.5,'rgba(56,225,255,0.09)');sg.addColorStop(1,'rgba(56,225,255,0)');

  ctx.fillStyle='rgba(140,240,255,0.14)';ctx.fillRect(0,sy2,W,1);

  for(const s of _jvSpecks){
    const yy=(((s.y-tick*s.v)%H)+H)%H,tw=0.06+0.10*(0.5+0.5*Math.sin(tick*0.03+s.p));

  }

}

  ctx.globalCompositeOperation='lighter';
  if(r<3.2){   // LOD 廉价路径：≤2 fill、无芒无渐变
    if(n.type==='file'){ctx.fillStyle=hx(c,0.5*dep*tw);ctx.beginPath();ctx.arc(x,y,Math.max(0.6,r*0.7),0,6.2832);ctx.fill();}
    else{ctx.fillStyle=hx(c,0.38*dep*tw);ctx.beginPath();ctx.arc(x,y,r*1.5,0,6.2832);ctx.fill();
      ctx.fillStyle=hx('#ffffff',0.85*dep*tw);ctx.beginPath();ctx.arc(x,y,r*0.55,0,6.2832);ctx.fill();}
    ctx.globalCompositeOperation='source-over';return;
  }
  if(n.type==='file'){   // file = 针尖
    ctx.fillStyle=hx(c,0.55*dep*tw);ctx.beginPath();ctx.arc(x,y,r*0.8,0,6.2832);ctx.fill();
    ctx.fillStyle=hx('#ffffff',0.6*dep);ctx.beginPath();ctx.arc(x,y,r*0.35,0,6.2832);ctx.fill();
    ctx.globalCompositeOperation='source-over';return;
  }
  ctx.fillStyle=hx(c,0.34*dep*tw);ctx.beginPath();ctx.arc(x,y,r*1.5,0,6.2832);ctx.fill();   // 外层色晕(提亮保色相)
  const sp=r>=5?_gxSpk[n.type]:null;   // entry/file 无芒 = 干净小星
  if(sp){   // project 6 芒+双环晕最醒目；machine 4 长芒；中层实体 4 短芒
    const len=r*sp.L*(0.85+0.15*tw),stp=6.2832/sp.k,bw=sp.ring?r*0.20:r*0.15;
    ctx.fillStyle=hx(c,0.3*dep);
    for(let i=0;i<sp.k;i++)_gxSpike(x,y,sp.rot+i*stp,len,bw);
    ctx.fillStyle=hx('#ffffff',0.5*dep);
    for(let i=0;i<sp.k;i++)_gxSpike(x,y,sp.rot+i*stp,len*0.72,bw*0.55);
    if(sp.ring){ctx.strokeStyle=hx('#ffe8c8',0.42*dep);ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(x,y,r*1.7,0,6.2832);ctx.stroke();
      ctx.strokeStyle=hx('#ffe8c8',0.2*dep);ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(x,y,r*2.2,0,6.2832);ctx.stroke();}   // 项目独有双环签名
  }
  ctx.fillStyle=hx(c,0.42*dep);ctx.beginPath();ctx.arc(x,y,r*0.95,0,6.2832);ctx.fill();   // 星体
  ctx.fillStyle=hx('#ffffff',0.92*dep*(0.8+0.2*tw));ctx.beginPath();ctx.arc(x,y,r*0.45,0,6.2832);ctx.fill();   // 白热核
  ctx.globalCompositeOperation='source-over';
}
THEMES.galaxy={label:'银河 GALAXY',
  css:{holo:'#9fb6ff',gold:'#ffd9a0',bg0:'#02010a',panel:'rgba(10,10,26,.72)',line:'rgba(150,170,255,.2)',fg:'#e8ecff',mut:'#6a7096'},
  glowScale:0.45,vignette:true,
  initBg:_gxInitBg,bg:_gxBg,glyph:_gxGlyph};

// 风格下拉（顶栏右侧 sq- 色卡菜单）：触发钮 + 2×2 色卡；点卡切风格，点外部/Esc 关闭
const sqTrig=document.getElementById('sq-trig'),sqMenu=document.getElementById('sq-menu'),
      sqCur=document.getElementById('sq-cur'),sqCards=[...document.querySelectorAll('#sq-menu .sq-card')];
function _sqOpen(o){sqMenu.classList.toggle('show',o);sqTrig.classList.toggle('open',o);
  sqTrig.setAttribute('aria-expanded',o?'true':'false');sqMenu.setAttribute('aria-hidden',o?'false':'true');}
function _styleSync(k){const c=sqCards.find(b=>b.dataset.s===k);   // setStyle() 内调用它同步触发钮标签+卡片高亮
  if(c)sqCur.textContent=c.querySelector('.sq-nm').textContent;
  sqCards.forEach(b=>{const on=b.dataset.s===k;
    b.classList.toggle('on',on);b.setAttribute('aria-checked',on?'true':'false');});}
sqTrig.onclick=e=>{e.stopPropagation();_sqOpen(!sqMenu.classList.contains('show'));};
sqCards.forEach(b=>b.onclick=e=>{e.stopPropagation();setStyle(b.dataset.s);_styleSync(styleKey);_sqOpen(false);});
document.addEventListener('click',e=>{if(!sqTrig.contains(e.target)&&!sqMenu.contains(e.target))_sqOpen(false);});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&sqMenu.classList.contains('show'))_sqOpen(false);});
_styleSync(styleKey);   // 初始状态来自 styleKey（hash/localStorage/默认 cosmos），修正 HTML 里写死的 cosmos 高亮
applyThemeCss();
setup();load();
</script>
